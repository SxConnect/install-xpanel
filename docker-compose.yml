version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: xpanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xpanel}
      POSTGRES_USER: ${POSTGRES_USER:-xpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xpanel_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xpanel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # XPanel Backend API
  # ============================================
  backend:
    image: ghcr.io/sxconnect/xpanel-backend:${VERSION:-latest}
    container_name: xpanel-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-xpanel}:${POSTGRES_PASSWORD:-xpanel_secure_password}@postgres:5432/${POSTGRES_DB:-xpanel}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # Server
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      
      # Docker
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - backend_logs:/app/logs
    networks:
      - xpanel-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # XPanel Frontend
  # ============================================
  frontend:
    image: ghcr.io/sxconnect/xpanel-frontend:${VERSION:-latest}
    container_name: xpanel-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - xpanel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================
# Networks
# ============================================
networks:
  xpanel-network:
    driver: bridge
    name: xpanel-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: xpanel-postgres-data
  backend_logs:
    name: xpanel-backend-logs
