version: '3.8'

services:
  # ============================================
  # XPanel Client (Interface Pública)
  # ============================================
  xpanel-client:
    image: ghcr.io/sxconnect/xpanel-client:${VERSION:-latest}
    container_name: xpanel-client
    restart: unless-stopped
    environment:
      # URL do XPanel Master (servidor central)
      VITE_API_URL: ${MASTER_URL:-https://master.xpanel.com}
      
      # Identificação desta instalação
      INSTANCE_ID: ${INSTANCE_ID}
      INSTANCE_NAME: ${INSTANCE_NAME:-XPanel Client}
      INSTANCE_EMAIL: ${INSTANCE_EMAIL}
    ports:
      - "${CLIENT_PORT:-3000}:80"
    networks:
      - xpanel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================
# Networks
# ============================================
networks:
  xpanel-network:
    driver: bridge
    name: xpanel-client-network
